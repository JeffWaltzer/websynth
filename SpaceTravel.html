<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypnotic Spirals // Audio Reactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Psychedelic Base */
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(circle, #1a0033 0%, #000000 100%);
            overflow: hidden;
            margin: 0;
            padding: 0;
            color: #00ffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Neon Utilities */
        .neon-box {
            background: rgba(10, 0, 20, 0.85);
            border-radius: 25px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4), inset 0 0 20px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .neon-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            color: #00ffff;
            border-radius: 50px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            text-shadow: 0 0 5px #00ffff;
        }
        .neon-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 20px #00ffff, inset 0 0 10px #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #fff;
        }
        .neon-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 0 5px #00ffff;
        }
        .neon-btn:disabled {
            border-color: #555;
            color: #555;
            box-shadow: none;
            text-shadow: none;
            cursor: default;
        }

        /* Psychedelic Title Effect */
        .psycho-title {
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 700;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #00ff00, #ffff00, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite, pulse-scale 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes pulse-scale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hidden-visually {
            opacity: 0;
            pointer-events: none;
        }

        /* Canvas Positioning */
        #visualizerCanvas {
            box-shadow: 0 0 60px rgba(255, 0, 255, 0.2);
            background: transparent;
        }

        /* Custom scrollbar for file info */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #ff00ff; border-radius: 3px; }
    </style>
    <style>
        .toolbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 0, 20, 0.9);
            padding: 8px;
            box-sizing: border-box;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }
        .toolbar button {
            background: transparent;
            color: #00ffff;
            border: 1px solid #00ffff;
            border-radius: 15px;
            padding: 4px 12px;
            margin: 2px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
        }
        .toolbar button:hover {
            background: rgba(0, 255, 255, 0.2);
            color: white;
            box-shadow: 0 0 10px #00ffff;
        }
        .toolbar button:disabled {
            background: #222;
            color: #666;
            border-color: #444;
            cursor: default;
            box-shadow: none;
        }
    </style>
</head>

<!-- Recording Interface -->
<div id="controlsUI" class="fixed bottom-8 left-0 w-full z-40 flex justify-center items-center gap-4 hidden-visually transition-opacity duration-500">

        <!-- Play/Pause Control -->
        <button id="playPauseBtn" class="w-12 h-12 rounded-full bg-transparent border-2 border-[#00ffff] text-[#00ffff] hover:bg-[#00ffff]/20 hover:shadow-[0_0_15px_#00ffff] flex items-center justify-center transition-all transform hover:scale-110">

<!-- Error Toast -->
<div id="errorToast" class="fixed top-4 right-4 z-50 bg-red-900 border-2 border-red-500 text-white px-6 py-4 rounded-xl shadow-[0_0_20px_red] hidden">

<script>
    // --- Configuration ---
    const CONFIG = {
        video: {
            width: 1920,
            height: 1080
        }
    };

    // --- State Management ---
    const state = {
        isRecording: false,
        isPlaying: false,
        audioContext: null,
        analyser: null,
        dataArray: null,
        sourceNode: null,
        recordDest: null,
        mediaRecorder: null,
        recordedChunks: [],
        animationId: null,
        frameCount: 0,
        currentFileName: null,
        fadeOutStart: 0
    };

    // --- DOM Elements ---
    const canvas = document.getElementById('visualizerCanvas');
    const ctx = canvas.getContext('2d');
    const startModal = document.getElementById('startModal');
    const controlsUI = document.getElementById('controlsUI');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const audioInput = document.getElementById('audioInput');
    const startBtn = document.getElementById('startButton');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const recordBtn = document.getElementById('recordBtn');
    const recStatus = document.getElementById('recStatus');
    const recIcon = document.getElementById('recIcon');
    const audioElement = document.getElementById('audioElement');
    const sourceStatus = document.getElementById('sourceStatus');
    const fileInfo = document.getElementById('fileInfo');
    const errorToast = document.getElementById('errorToast');
    const errorMsg = document.getElementById('errorMsg');
    const autoRecToggle = document.getElementById('autoRecToggle');
    const autoRecLabel = document.getElementById('autoRecLabel');

    // --- Visualizer Classes ---

    class DualSpirals {
        constructor() {
            this.rotation1 = 0;
            this.rotation2 = 0;
            this.rotation3 = 0;
            this.rotation4 = 0;
            this.pulse = 0;
            this.hue = 0;
            this.targetHue = 0; // Added for smooth color transitions
            this.beatTimer = 0;
            this.time = 0;

            // Smoothing variables for fluid animations
            this.sBass = 0;
            this.sMids = 0;
            this.sTreble = 0;
        }

        update(audioData) {
            // Audio frequency bands
            const subBass = audioData.slice(0, 5).reduce((a, b) => a + b, 0) / 5 / 255;
            const rawBass = audioData.slice(5, 15).reduce((a, b) => a + b, 0) / 10 / 255;
            const rawMids = audioData.slice(20, 50).reduce((a, b) => a + b, 0) / 30 / 255;
            const rawTreble = audioData.slice(100, 120).reduce((a, b) => a + b, 0) / 20 / 255;

            // Apply easing (lerp) for buttery smooth transitions
            this.sBass += (rawBass - this.sBass) * 0.1;
            this.sMids += (rawMids - this.sMids) * 0.15;
            this.sTreble += (rawTreble - this.sTreble) * 0.2;

            // Beat Detection
            if (this.beatTimer > 0) this.beatTimer--;

            if (subBass > 0.85 && this.beatTimer === 0) {
                this.pulse = 1.0;
                this.beatTimer = 8;
                this.targetHue += 60; // Jump the target hue, not actual hue
            }

            // Decay the pulse much slower for smoother zooming/ripples
            this.pulse *= 0.94;

            // Smoothly ease the current hue towards the target hue
            this.hue += (this.targetHue - this.hue) * 0.1;

            // Smooth time progression, speeds up gracefully with smoothed energy
            this.time += 0.02 + (this.sBass * 0.08);

            // Dynamic Rotations - smoother pacing
            this.rotation1 = this.time * 2.0 + (Math.sin(this.time * 1.5) * 0.5);
            this.rotation2 = -this.time * 1.8 - (Math.cos(this.time * 1.0) * 0.5);
            this.rotation3 = this.time * 3.0 + (this.pulse * 0.5);
            this.rotation4 = -this.time * 3.5 - (this.pulse * 0.8);

            // Cycle base hue smoothly, drifts with bass
            const hueDrift = 1 + (this.sBass * 5);
            this.hue += hueDrift;
            this.targetHue += hueDrift; // Keep target moving to prevent stalling
        }

        draw(ctx, w, h, audioData) {
            const cx = w / 2;
            const cy = h / 2;

            // 1. Subtle Plasma Background
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(5, 0, 10, ${0.8 - (this.pulse * 0.2)})`;
            ctx.fillRect(0, 0, w, h);

            // Plasma blobs drifting based on time
            const t = this.time * 0.5; // Slower background drifting
            const b1x = cx + Math.sin(t * 0.7) * cx * 0.6;
            const b1y = cy + Math.cos(t * 0.5) * cy * 0.6;
            const b2x = cx + Math.cos(t * 0.4) * cx * 0.6;
            const b2y = cy + Math.sin(t * 0.9) * cy * 0.6;

            ctx.globalCompositeOperation = 'lighter';

            // Purple blob
            const grad1 = ctx.createRadialGradient(b1x, b1y, 0, b1x, b1y, cx * 1.5);
            grad1.addColorStop(0, `rgba(60, 0, 80, 0.4)`);
            grad1.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad1;
            ctx.fillRect(0, 0, w, h);

            // Blue blob
            const grad2 = ctx.createRadialGradient(b2x, b2y, 0, b2x, b2y, cx * 1.5);
            grad2.addColorStop(0, `rgba(0, 40, 100, 0.4)`);
            grad2.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.translate(cx, cy);

            // OPTICAL ILLUSION: The Breathing Zoom (Smoothed)
            // Zoomed out even further (changed base scale from 0.45 to 0.25)
            const zoomScale = 0.25 + Math.sin(this.time * 1.5) * 0.08 + (this.pulse * 0.15);
            ctx.scale(zoomScale, zoomScale);

            // 2. The Illusionary "Difference" Layers
            ctx.globalCompositeOperation = 'difference';

            // Calculate pulsating HSL colors
            const l = 50 + (this.pulse * 20); // Less aggressive lightness spike
            const color1 = `hsl(${this.hue % 360}, 100%, ${l}%)`;
            const color2 = `hsl(${(this.hue + 120) % 360}, 100%, ${l}%)`;
            const color3 = `hsl(${(this.hue + 240) % 360}, 100%, ${l}%)`;

            // Core spiral flashes bright white/pastel on beat
            const color4 = `hsl(${(this.hue + 60) % 360}, 100%, ${70 + this.pulse * 20}%)`;

            // Make all lines significantly thinner!
            // Layer 1: Forward Rotating Spirograph
            this.drawSpiroSpiral(ctx, 0, 0, this.rotation1, 1, 8, 4, 16, 1.0, this.sMids, color1, 10 + this.pulse * 15);

            // Layer 2: Backward Rotating Spirograph
            this.drawSpiroSpiral(ctx, 0, 0, this.rotation2, -1, 8, 4, 16, 1.0, this.sMids, color2, 10 + this.pulse * 15);

            // Layer 3: Forward Rotating Rapid Inner Spiro Loops
            this.drawSpiroSpiral(ctx, 0, 0, this.rotation3, 1, 16, 2, 24, 0.5, this.sTreble, color3, 4 + this.pulse * 8);

            // 3. Central Anchor Core (Source-Over)
            ctx.globalCompositeOperation = 'source-over';

            // Layer 4: Backward Rotating Ultra-Dense Center Coil
            this.drawSpiroSpiral(ctx, 0, 0, this.rotation4, -1, 4, 10, 8, 0.2, this.sMids, color4, 2 + this.pulse * 5);

            // Intricate Multi-Layered Geometric Mandala Anchor at the very center
            this.drawSmoothRoseCore(ctx, 0, 0, this.sBass, this.sMids, this.sTreble);

            ctx.restore();
        }

        drawSpiroSpiral(ctx, cx, cy, rotation, direction, arms, coilRotations, loops, loopScale, rippleMetric, color, lineWidth) {
            // Very high resolution to ensure perfect curves
            const pointsPerArm = 500;
            const maxRadius = 6000;

            for (let a = 0; a < arms; a++) {
                const armOffset = (Math.PI * 2 / arms) * a;

                ctx.beginPath();
                for (let i = 0; i < pointsPerArm; i++) {
                    const progress = i / pointsPerArm;

                    const baseRadius = Math.pow(progress, 1.3) * maxRadius;

                    const theta = progress * Math.PI * 2 * coilRotations * direction + rotation + armOffset;

                    const primaryX = cx + baseRadius * Math.cos(theta);
                    const primaryY = cy + baseRadius * Math.sin(theta);

                    // Smooth loop radius modulation
                    const loopBoost = 1 + rippleMetric * 1.5;
                    const loopRadius = 250 * progress * loopScale * loopBoost * (1 + this.pulse * 0.3);
                    const loopAngle = progress * Math.PI * 2 * loops * direction + (this.time * 6);

                    const finalX = primaryX + loopRadius * Math.cos(loopAngle);
                    const finalY = primaryY + loopRadius * Math.sin(loopAngle);

                    if (i === 0) ctx.moveTo(finalX, finalY);
                    else ctx.lineTo(finalX, finalY);
                }

                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = lineWidth;
                ctx.strokeStyle = color;
                ctx.stroke();
            }
        }

        drawSmoothRoseCore(ctx, cx, cy, bass, mid, treble) {
            // Smoothed base size - significantly reduced size of center graphic
            const coreRadius = 40 + (this.pulse * 40) + (bass * 30);

            ctx.save();
            ctx.translate(cx, cy);

            ctx.beginPath();
            ctx.arc(0, 0, coreRadius * 1.3, 0, Math.PI * 2);
            ctx.fillStyle = '#050010';
            ctx.fill();
            ctx.lineWidth = 2 + this.pulse * 3; // Thinner
            ctx.strokeStyle = `hsl(${(this.hue + 180) % 360}, 100%, 60%)`;
            ctx.stroke();

            // --- Layer 1: Outer geometric starburst ---
            // Smoothly transitioning star points
            const starPoints = 6 + Math.floor(bass * 8);
            ctx.rotate(this.time * 1.0);
            ctx.beginPath();
            for(let i=0; i<starPoints * 2; i++) {
                const angle = (Math.PI * 2 / (starPoints * 2)) * i;
                const r = i % 2 === 0 ? coreRadius * 1.2 : coreRadius * (0.4 + mid * 0.6);
                if (i===0) ctx.moveTo(r * Math.cos(angle), r * Math.sin(angle));
                else ctx.lineTo(r * Math.cos(angle), r * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fillStyle = `hsla(${(this.hue + 90) % 360}, 100%, 30%, 0.8)`;
            ctx.fill();
            ctx.lineWidth = 1.5; // Thinner
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            // --- Layer 2: Complex Counter-Rotating Multi-Rose Mandala ---
            const layers = 3;
            for (let j = 1; j <= layers; j++) {
                const petals = 3 + j * 2 + Math.floor(mid * 3);
                const resolution = 200;

                ctx.rotate(-this.time * 2 * j);
                ctx.beginPath();

                for(let i = 0; i <= resolution; i++) {
                    const angle = (Math.PI * 2 / resolution) * i;
                    const radiusMod = Math.sin(angle * petals + (this.time * j));
                    const r = (coreRadius * 0.95 / j) * (0.5 + 0.5 * radiusMod) * (1 + treble * 0.4);

                    if (i === 0) ctx.moveTo(r * Math.cos(angle), r * Math.sin(angle));
                    else ctx.lineTo(r * Math.cos(angle), r * Math.sin(angle));
                }
                ctx.closePath();
                ctx.lineWidth = 1.5 + this.pulse * 2; // Thinner lines
                ctx.strokeStyle = `hsl(${(this.hue + j * 75) % 360}, 100%, ${60 + this.pulse * 40}%)`;
                ctx.stroke();

                if (j === layers) {
                    ctx.fillStyle = `hsl(${this.hue % 360}, 100%, 50%)`;
                    ctx.fill();
                }
            }

            // --- Layer 3: The Pulsating Inner "Eye" ---
            ctx.beginPath();
            ctx.arc(0, 0, coreRadius * 0.15 * (1 + bass * 1.5), 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.lineWidth = 2; // Thinner
            ctx.strokeStyle = `hsl(${(this.hue + 180) % 360}, 100%, 50%)`;
            ctx.stroke();

            ctx.restore();
        }
    }

    // --- System Logic ---

    const spirals = new DualSpirals();

    function resizeCanvas() {
        canvas.width = CONFIG.video.width;
        canvas.height = CONFIG.video.height;

        const winW = window.innerWidth;
        const winH = window.innerHeight;
        const scale = Math.min(winW / CONFIG.video.width, winH / CONFIG.video.height);

        canvas.style.width = `${CONFIG.video.width * scale}px`;
        canvas.style.height = `${CONFIG.video.height * scale}px`;
    }

    function initAudioEngine() {
        if (state.audioContext) return true; // Prevent re-initialization

        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            state.audioContext = new AudioContext();

            state.analyser = state.audioContext.createAnalyser();
            state.analyser.fftSize = 256;
            // Increased smoothing time constant for smoother analyser data
            state.analyser.smoothingTimeConstant = 0.9;

            state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);

            state.sourceNode = state.audioContext.createMediaElementSource(audioElement);

            // Clean Audio Routing
            // 1. Source -> Analyser -> Destination (Speakers)
            state.sourceNode.connect(state.analyser);
            state.analyser.connect(state.audioContext.destination);

            // 2. Analyser -> Recording Stream Destination
            state.recordDest = state.audioContext.createMediaStreamDestination();
            state.analyser.connect(state.recordDest);

            return true;
        } catch (e) {
            console.error("Audio Engine Error:", e);
            showError("Web Audio API not supported.");
            return false;
        }
    }

    function renderLoop() {
        state.animationId = requestAnimationFrame(renderLoop);
        state.frameCount++;

        if (state.analyser && !audioElement.paused) {
            state.analyser.getByteFrequencyData(state.dataArray);
        } else if (state.dataArray && audioElement.paused) {
            for(let i=0; i<state.dataArray.length; i++) {
                state.dataArray[i] = Math.max(0, state.dataArray[i] - 5);
            }
        }

        if (state.dataArray) {
            spirals.update(state.dataArray);
            spirals.draw(ctx, canvas.width, canvas.height, state.dataArray);
        }

        // Fade Out Overlay (active when song ends)
        if (state.fadeOutStart > 0) {
            const elapsed = performance.now() - state.fadeOutStart;
            const duration = 10000;
            const alpha = Math.min(1, elapsed / duration);

            if (alpha > 0) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }
    }

    // --- Recording Logic ---

    function setupRecorder() {
        const canvasStream = canvas.captureStream(60);
        let finalStream = canvasStream;

        if (state.recordDest) {
            const audioTracks = state.recordDest.stream.getAudioTracks();
            if (audioTracks.length > 0) {
                finalStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioTracks]);
            }
        }

        const mimeTypes = [
            'video/webm;codecs=vp9,opus',
            'video/webm;codecs=vp8,opus',
            'video/webm'
        ];

        let selectedMime = mimeTypes.find(type => MediaRecorder.isTypeSupported(type)) || '';

        if (!selectedMime) {
            if (MediaRecorder.isTypeSupported('video/webm')) selectedMime = 'video/webm';
            else {
                showError("Screen recording not supported.");
                return;
            }
        }

        try {
            state.mediaRecorder = new MediaRecorder(finalStream, { mimeType: selectedMime, videoBitsPerSecond: 12000000 });

            state.mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) state.recordedChunks.push(e.data);
            };

            state.mediaRecorder.onstop = saveRecording;

        } catch (e) {
            console.error(e);
            showError("Recorder initialization failed.");
        }
    }

    function toggleRecording() {
        if (!state.mediaRecorder) setupRecorder();
        if (!state.mediaRecorder) return;

        if (state.isRecording) {
            state.mediaRecorder.stop();
            state.isRecording = false;
            updateRecordUI(false);
        } else {
            state.recordedChunks = [];
            state.mediaRecorder.start();
            state.isRecording = true;
            updateRecordUI(true);
        }
    }

    function saveRecording() {
        const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;

        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');

        let filename = `hypnotic-spirals-${timestamp}.webm`;
        if (state.currentFileName) {
            const cleanName = state.currentFileName.replace(/\.[^/.]+$/, "").replace(/[^a-zA-Z0-9\-_ ]/g, "");
            filename = `hypnotic-spirals-${cleanName}-${timestamp}.webm`;
        }

        a.download = filename;

        document.body.appendChild(a);
        a.click();

        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 100);

        recStatus.innerText = "SAVED!";
        setTimeout(() => {
            if(!state.isRecording) recStatus.innerText = "STANDBY";
        }, 2000);
    }

    function updateRecordUI(isRecording) {
        if (isRecording) {
            recStatus.innerText = "REC";
            recStatus.classList.add("text-red-500", "animate-pulse");
            recStatus.classList.remove("text-[#00ffff]");
            recIcon.classList.remove("rounded-full");
            recIcon.classList.add("rounded-sm");
            recordBtn.classList.add("bg-red-500/20");
        } else {
            recStatus.innerText = "PROCESSING";
            recStatus.classList.remove("text-red-500", "animate-pulse");
            recStatus.classList.add("text-[#00ffff]");
            recIcon.classList.add("rounded-full");
            recIcon.classList.remove("rounded-sm");
            recordBtn.classList.remove("bg-red-500/20");
        }
    }

    function showError(msg) {
        errorMsg.innerText = msg;
        errorToast.classList.remove('hidden');
        setTimeout(() => errorToast.classList.add('hidden'), 5000);
    }

    // Toggle Listener
    autoRecToggle.addEventListener('change', (e) => {
        if(e.target.checked) {
            autoRecLabel.innerText = "ON";
            autoRecLabel.classList.remove('text-gray-500');
            autoRecLabel.classList.add('text-[#00ffff]');
        } else {
            autoRecLabel.innerText = "OFF";
            autoRecLabel.classList.add('text-gray-500');
            autoRecLabel.classList.remove('text-[#00ffff]');
        }
    });

    selectFileBtn.addEventListener('click', () => {
        audioInput.click();
    });

    audioInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            state.currentFileName = file.name;
            const url = URL.createObjectURL(file);
            audioElement.src = url;
            sourceStatus.innerText = "LOCKED ON";
            sourceStatus.classList.remove("text-yellow-400");
            sourceStatus.classList.add("text-[#00ffff]");
            fileInfo.innerText = "♪ " + file.name;
            fileInfo.classList.remove('hidden');
            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50');
            startBtn.classList.add('shadow-[0_0_20px_#ff00ff]', 'transform', 'hover:scale-105');
        }
    });

    playPauseBtn.addEventListener('click', () => {
        if (audioElement.paused) {
            audioElement.play();
            state.isPlaying = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            state.fadeOutStart = 0;
            if(state.audioContext && state.audioContext.state === 'suspended') {
                state.audioContext.resume();
            }
        } else {
            audioElement.pause();
            state.isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    });

    audioElement.addEventListener('ended', () => {
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        state.isPlaying = false;

        state.fadeOutStart = performance.now();

        if (state.isRecording) {
            setTimeout(() => {
                if (state.isRecording && state.fadeOutStart > 0) {
                    toggleRecording();
                    state.fadeOutStart = 0;
                }
            }, 10000);
        }
    });

    startBtn.addEventListener('click', async () => {
        startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ENGAGING...';
        state.fadeOutStart = 0;

        const audioReady = initAudioEngine();
        if (!audioReady) return;

        if (state.audioContext.state === 'suspended') {
            await state.audioContext.resume();
        }

        try {
            await audioElement.play();
            state.isPlaying = true;
        } catch(e) {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }

        resizeCanvas();
        renderLoop();

        startModal.classList.add('hidden-visually');
        setTimeout(() => {
            startModal.classList.add('hidden');
            controlsUI.classList.remove('hidden-visually');
        }, 500);

        setupRecorder();

        if (state.mediaRecorder && !state.isRecording && autoRecToggle.checked) {
            toggleRecording();
        }
    });

    recordBtn.addEventListener('click', toggleRecording);
    window.addEventListener('resize', resizeCanvas);

</script>
</body>
</html>
